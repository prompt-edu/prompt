name: Setup Node
description: Setup the node environment

runs:
  using: "composite"
  steps:
    - run: corepack enable
      shell: bash
    - uses: actions/setup-node@v6
      with:
        node-version: "24.15.0"
        cache: "yarn"
        cache-dependency-path: ./clients/yarn.lock
    - run: yarn install
      shell: bash
