name: Quality Servers

on:
  workflow_call:
    inputs:
      modules:
        description: "JSON array of server modules to check"
        required: true
        type: string

permissions:
  contents: read

jobs:
  quality-server:
    if: inputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(inputs.modules) }}
    defaults:
      run:
        working-directory: servers/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: "servers/${{ matrix.module }}/*.sum"
      - name: Install dependencies
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: servers/${{ matrix.module }}
          args: --timeout 5m
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
