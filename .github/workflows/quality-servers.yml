name: Quality Servers

on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - assessment
          - certificate
          - core
          - interview
          - self_team_allocation
          - team_allocation
          - template_server
    defaults:
      run:
        working-directory: servers/${{ matrix.module }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: "servers/**/*.sum"
      - name: Install dependencies
        run: go mod download
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
      - name: Check sqlc generated files are current
        env:
          MODULE: ${{ matrix.module }}
        run: |
          sqlc generate

          if [ -n "$(git status --porcelain -- db/sqlc)" ]; then
            echo "sqlc generated files are out of date. Run:"
            echo "  cd servers/${MODULE} && sqlc generate"
            git status --short -- db/sqlc
            git diff -- db/sqlc
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: servers/${{ matrix.module }}
          args: --timeout 5m
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
