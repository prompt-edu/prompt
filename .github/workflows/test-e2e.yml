name: E2E Tests

on:
  workflow_call: {}
  # Allow running on demand from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # Base stack + gha cache read override. The build job appends the cache-write
  # override; the shards read from the cache the build job populated.
  COMPOSE_READ: >-
    -f docker-compose.e2e.yml
    -f docker-compose.e2e.cache.yml
    --env-file e2e/.env.e2e

jobs:
  # Build every image once and populate the gha layer cache. The shard jobs then
  # restore from it (a fast, near-no-op rebuild) instead of each building the
  # whole stack from scratch.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build the e2e stack (populate the gha layer cache)
        run: |
          docker compose ${COMPOSE_READ} \
            -f docker-compose.e2e.cache-write.yml build

  # One shard per microservice, each booting its own fresh stack (own DB seed),
  # so modules are isolated without any per-spec coordination. 1 worker per shard
  # keeps within-shard runs serial; parallelism comes from the matrix.
  e2e:
    needs: build
    runs-on: ubuntu-latest
    # Runtime budget: a shard exceeding this fails the job (Playwright's
    # globalTimeout, set below, fails first with a cleaner message). The job
    # timeout sits above the 20-min Playwright globalTimeout so Playwright times
    # out first with a clean message and still uploads its blob report.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: core
            paths: >-
              tests/application tests/auth tests/configurator tests/course-staff
              tests/courses tests/students tests/permissions
              tests/api/courses.api.spec.ts tests/api/application-apply.api.spec.ts
              tests/api/application-files.api.spec.ts tests/api/course-staff.api.spec.ts
          - name: interview
            paths: tests/interview tests/api/interview.api.spec.ts
          - name: matching
            paths: tests/matching tests/api/matching.api.spec.ts
          - name: team-allocation
            paths: tests/team-allocation tests/api/team-allocation.api.spec.ts
          - name: self-team-allocation
            paths: tests/self-team-allocation tests/api/self-team-allocation.api.spec.ts
          - name: assessment
            paths: tests/assessment tests/api/assessment.api.spec.ts
          - name: certificate
            paths: tests/certificate tests/api/certificate.api.spec.ts
          - name: example
            paths: tests/example tests/api/example.api.spec.ts
    env:
      # Per-shard blob report (merged downstream); enforce the 20-min budget.
      PW_BLOB: "1"
      PW_SHARD_NAME: ${{ matrix.name }}
      PW_GLOBAL_TIMEOUT_MIN: "20"
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3

      - name: Prepare report directories
        run: mkdir -p e2e/playwright-report e2e/test-results e2e/blob-report

      - name: Build the e2e stack (restore from the gha layer cache)
        run: docker compose ${COMPOSE_READ} build

      - name: Run e2e shard "${{ matrix.name }}"
        run: |
          docker compose ${COMPOSE_READ} run --rm e2e-runner \
            npx playwright test ${{ matrix.paths }}

      - name: Tear down
        if: always()
        run: docker compose ${COMPOSE_READ} down -v

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-${{ matrix.name }}
          path: e2e/blob-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload failure artifacts (traces, videos, screenshots)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.name }}
          path: e2e/test-results
          retention-days: 7
          if-no-files-found: ignore

  # Merge the per-shard blob reports into a single HTML report.
  merge:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Download all blob reports
        uses: actions/download-artifact@v7
        with:
          pattern: blob-report-*
          path: e2e/all-blob-reports
          merge-multiple: true

      - name: Merge into a single HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports
        working-directory: e2e
        env:
          PLAYWRIGHT_HTML_OPEN: never

      - name: Upload merged Playwright report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14
          if-no-files-found: ignore
