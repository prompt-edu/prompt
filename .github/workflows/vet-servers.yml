name: Vet Servers

on:
  workflow_call:
    inputs:
      modules:
        description: "JSON array of server modules to vet"
        required: true
        type: string

permissions:
  contents: read

jobs:
  vet-server:
    if: inputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(inputs.modules) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: "servers/${{ matrix.module }}/*.sum"
      - name: Install dependencies
        run: cd servers/${{ matrix.module }} && go mod download
      - name: go vet
        run: cd servers/${{ matrix.module }} && go vet ./...
