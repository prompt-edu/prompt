{{- if eq .Values.global.objectStorage.mode "in-cluster" }}
{{- $sw := .Values.seaweedfs -}}
{{- $rel := .Release.Name -}}
{{- $img := $sw.image -}}
{{- $secret := include "prompt.appSecretName" . -}}
{{/* Services */}}
{{- range $svc := list (dict "n" "master" "p" 9333) (dict "n" "volume" "p" 8080) (dict "n" "filer" "p" 8888) (dict "n" "s3" "p" 8333) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-seaweedfs-%s" $rel $svc.n }}
  labels:
    {{- include "prompt.labels" (dict "root" $ "component" (printf "seaweedfs-%s" $svc.n)) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "prompt.selectorLabels" (dict "root" $ "component" (printf "seaweedfs-%s" $svc.n)) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.p }}
      targetPort: {{ $svc.p }}
---
{{- end }}
{{/* Master */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ printf "%s-seaweedfs-master" $rel }}
  labels:
    {{- include "prompt.labels" (dict "root" . "component" "seaweedfs-master") | nindent 4 }}
spec:
  serviceName: {{ printf "%s-seaweedfs-master" $rel }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-master") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-master") | nindent 8 }}
    spec:
      containers:
        - name: master
          image: {{ $img }}
          args: ["master", "-ip=$(POD_IP)", "-ip.bind=0.0.0.0"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 9333
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $sw.masterStorage }}
---
{{/* Volume */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ printf "%s-seaweedfs-volume" $rel }}
  labels:
    {{- include "prompt.labels" (dict "root" . "component" "seaweedfs-volume") | nindent 4 }}
spec:
  serviceName: {{ printf "%s-seaweedfs-volume" $rel }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-volume") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-volume") | nindent 8 }}
    spec:
      containers:
        - name: volume
          image: {{ $img }}
          args: ["volume", "-mserver={{ printf "%s-seaweedfs-master" $rel }}:9333", "-ip=$(POD_IP)", "-ip.bind=0.0.0.0", "-port=8080"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $sw.volumeStorage }}
---
{{/* Filer */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ printf "%s-seaweedfs-filer" $rel }}
  labels:
    {{- include "prompt.labels" (dict "root" . "component" "seaweedfs-filer") | nindent 4 }}
spec:
  serviceName: {{ printf "%s-seaweedfs-filer" $rel }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-filer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-filer") | nindent 8 }}
    spec:
      containers:
        - name: filer
          image: {{ $img }}
          args: ["filer", "-master={{ printf "%s-seaweedfs-master" $rel }}:9333", "-ip=$(POD_IP)", "-ip.bind=0.0.0.0"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $sw.filerStorage }}
---
{{/* S3 gateway (stateless) */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-seaweedfs-s3" $rel }}
  labels:
    {{- include "prompt.labels" (dict "root" . "component" "seaweedfs-s3") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-s3") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "prompt.selectorLabels" (dict "root" . "component" "seaweedfs-s3") | nindent 8 }}
    spec:
      containers:
        - name: s3
          image: {{ $img }}
          command: ["/bin/sh", "-ec"]
          args:
            - |
              cat >/tmp/s3.json <<EOF
              {"identities":[{"name":"prompt-s3","credentials":[{"accessKey":"$WEED_S3_USER","secretKey":"$WEED_S3_PWD"}],"actions":["Admin","Read","Write"]}]}
              EOF
              exec weed s3 -filer={{ printf "%s-seaweedfs-filer" $rel }}:8888 -ip.bind=0.0.0.0 -port=8333 -config=/tmp/s3.json
          env:
            - name: WEED_S3_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: S3_ACCESS_KEY
            - name: WEED_S3_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ $secret }}
                  key: S3_SECRET_KEY
          ports:
            - containerPort: 8333
---
{{/* Public S3 route on the dedicated s3. listener (Host preserved for SigV4). */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-seaweedfs-s3" $rel }}
  labels:
    {{- include "prompt.labels" (dict "root" . "component" "seaweedfs-s3") | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      sectionName: s3
  hostnames:
    - {{ printf "s3.%s" .Values.global.host | quote }}
  rules:
    - backendRefs:
        - name: {{ printf "%s-seaweedfs-s3" $rel }}
          port: 8333
{{- if eq .Values.global.gateway.rateLimiting.provider "envoygateway" }}
---
{{/* CORS so browsers can PUT/GET presigned URLs from the apex origin. */}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ printf "%s-seaweedfs-s3-cors" $rel }}
  labels:
    {{- include "prompt.labels" (dict "root" . "component" "seaweedfs-s3") | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ printf "%s-seaweedfs-s3" $rel }}
  cors:
    allowOrigins:
      - {{ include "infra.baseUrl" . | quote }}
    allowMethods: ["GET", "PUT", "POST", "DELETE", "HEAD", "OPTIONS"]
    allowHeaders: ["*"]
{{- end }}
{{- end }}
