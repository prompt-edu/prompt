    replicas: 1
    port: 8080
    apiPath: /team-allocation/api
    dbKey: team-allocation
    rateLimited: true
  client:
    enabled: true
    image: prompt-clients-team-allocation-component
    replicas: 1
    port: 80
    path: /team-allocation
    stripPrefix: true

self-team-allocation:
  enabled: true
  server:
    enabled: true
    image: prompt-server-self-team-allocation
    replicas: 1
    port: 8080
    apiPath: /self-team-allocation/api
    dbKey: self-team-allocation
