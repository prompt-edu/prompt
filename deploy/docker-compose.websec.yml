# PROMPT 2.0 - test-prod deployment for the IT-security course on `prompt-websec`.
#
# Derived from ../docker-compose.prod.yml with three deliberate deviations (see deploy/README.md):
#   1. Traefik terminates TLS on :443, obtains/renews a Let's Encrypt certificate, and redirects
#      all cleartext HTTP requests to https://prompt-websec.aet.cit.tum.de/.
#   2. Embedded Keycloak (+ its Postgres) served under the URL subpath /idp on the single host,
#      since no DNS subdomains exist. Realm (incl. example users) is imported on first start.
#   3. Router Host() rules use the bare literal domain, because ${CORE_HOST} carries the https://
#      scheme (it is consumed as a full URL by the Go backend for CORS / mail links / inter-service).
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.websec.yml --env-file deploy/.env.websec up --pull=always -d
# Relative volume paths resolve against deploy/ (the compose file's directory).

services:
  reverse-proxy:
    image: traefik:v2.11
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=prompt-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    networks:
      prompt-network:
        # Backends reach Keycloak via the public hostname through Traefik on the
        # Docker network (avoids the UFW-blocked container->host:80 path).
        aliases:
          - prompt-websec.aet.cit.tum.de

  maintenance:
    image: nginx:alpine
    container_name: prompt-maintenance
    restart: unless-stopped
    volumes:
      - ../maintenance:/usr/share/nginx/html:ro
      - ../maintenance/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maintenance.rule=Host(`prompt-websec.aet.cit.tum.de`)"
      - "traefik.http.routers.maintenance.entrypoints=websecure"
      - "traefik.http.routers.maintenance.tls.certresolver=letsencrypt"
      - "traefik.http.routers.maintenance.priority=1"
      - "traefik.http.services.maintenance.loadbalancer.server.port=80"
      - "traefik.http.middlewares.maintenance-compress.compress=true"
      - "traefik.http.routers.maintenance.middlewares=maintenance-compress"
    expose:
      - "80"
    networks:
      - prompt-network
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Authentication: Keycloak under /idp (relative path) + its own Postgres
  # ---------------------------------------------------------------------------
  keycloak-db:
    image: "postgres:15.18-alpine"
    container_name: prompt-keycloak-db
    environment:
      - POSTGRES_USER=${KEYCLOAK_DB_USER}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - POSTGRES_DB=keycloak
      - TZ=Europe/Berlin
    volumes:
      - ./keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prompt-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: prompt-keycloak
    command: ["start", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Served under https://prompt-websec.aet.cit.tum.de/idp behind Traefik.
      # The path is included in KC_HOSTNAME so the advertised issuer/frontend URLs
      # carry /idp (must match what the backend validates: ${KEYCLOAK_HOST}/realms/...).
      KC_HOSTNAME: https://prompt-websec.aet.cit.tum.de/idp
      KC_HTTP_RELATIVE_PATH: /idp
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloakConfig.rendered.json:/opt/keycloak/data/import/realm.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/idp`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - prompt-network
    healthcheck:
      # KC image has bash but no curl/wget; probe the realm endpoint over /dev/tcp.
      # The realm is served under the /idp relative path once Keycloak is up and the import finished.
      test:
        [
          "CMD-SHELL",
          'exec 3<>/dev/tcp/localhost/8080; echo -e "GET /idp/realms/prompt HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3; cat <&3 | head -n 1 | grep -qE " (200|301|302) "',
        ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Backend services (Go). extra_hosts maps the public FQDN back to the host so
  # OIDC issuer validation reaches Keycloak via http://.../idp through Traefik.
  # ---------------------------------------------------------------------------
  server-core:
    image: "ghcr.io/prompt-edu/prompt/prompt-server-core:${SERVER_CORE_IMAGE_TAG}"
    container_name: prompt-server-core
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-core.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/api`)"
      - "traefik.http.services.server-core.loadbalancer.server.port=8080"
      - "traefik.http.routers.server-core.entrypoints=websecure"
      - "traefik.http.routers.server-core.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=300"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=100"
      - "traefik.http.routers.server-core.middlewares=api-ratelimit"
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - CORE_HOST
      - SERVER_ADDRESS
      - DB_HOST
      - DB_PORT
      - DB_NAME
      - DB_PASSWORD
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - KEYCLOAK_CLIENT_ID
      - KEYCLOAK_CLIENT_SECRET
      - KEYCLOAK_ID_OF_CLIENT
      - KEYCLOAK_AUTHORIZED_PARTY
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USERNAME
      - SMTP_PASSWORD
      - SENDER_EMAIL
      - SENDER_NAME
      - SENTRY_DSN_CORE
      - SENTRY_ENABLED
      - S3_BUCKET
      - S3_REGION
      - S3_ENDPOINT
      - S3_PUBLIC_ENDPOINT
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_FORCE_PATH_STYLE
      - MAX_FILE_UPLOAD_SIZE_MB
      - ALLOWED_FILE_TYPES
    restart: unless-stopped
    networks:
      - prompt-network

  server-team-allocation:
    image: "ghcr.io/prompt-edu/prompt/prompt-server-team-allocation:${SERVER_TEAM_ALLOCATION_IMAGE_TAG}"
    container_name: prompt-server-team-allocation
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-team-allocation.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/team-allocation/api`)"
      - "traefik.http.routers.server-team-allocation.priority=220"
      - "traefik.http.services.server-team-allocation.loadbalancer.server.port=8080"
      - "traefik.http.routers.server-team-allocation.entrypoints=websecure"
      - "traefik.http.routers.server-team-allocation.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-team-allocation.middlewares=api-ratelimit"
    depends_on:
      db-team-allocation:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - CORE_HOST
      - SERVER_CORE_HOST
      - SERVER_ADDRESS
      - DB_HOST_TEAM_ALLOCATION
      - DB_PORT_TEAM_ALLOCATION
      - DB_NAME
      - DB_PASSWORD
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - SENTRY_DSN_TEAM_ALLOCATION
      - SENTRY_ENABLED
    restart: unless-stopped
    networks:
      - prompt-network

  server-self-team-allocation:
