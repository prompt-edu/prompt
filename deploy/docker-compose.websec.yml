      - SERVER_CORE_HOST
      - SERVER_ADDRESS
      - DB_HOST_CERTIFICATE=db-certificate
      - DB_PORT_CERTIFICATE=5432
      - DB_USER
      - DB_NAME
      - DB_PASSWORD
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - KEYCLOAK_AUTHORIZED_PARTY
      - SENTRY_DSN_CERTIFICATE
      - SENTRY_ENABLED
    restart: unless-stopped
    networks:
      - prompt-network

  # ---------------------------------------------------------------------------
  # Databases (one Postgres per service, matching the stock prod layout)
  # ---------------------------------------------------------------------------
  db:
    image: "postgres:15.18-alpine"
    container_name: prompt-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - TZ=Europe/Berlin
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prompt-network

  db-team-allocation:
    image: "postgres:15.18-alpine"
    container_name: prompt-db-team-allocation
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
