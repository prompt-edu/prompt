    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prompt-network

  db-certificate:
    image: "postgres:15.18-alpine"
    container_name: prompt-db-certificate
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - TZ=Europe/Berlin
    volumes:
      - ./postgres_certificate_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prompt-network

  # ---------------------------------------------------------------------------
  # Micro-frontends (nginx). Served behind Traefik with path stripping.
  # ---------------------------------------------------------------------------
  client-assessment-component:
    image: "ghcr.io/prompt-edu/prompt/prompt-clients-assessment-component:${ASSESSMENT_IMAGE_TAG}"
    container_name: prompt-client-assessment-component
    environment:
      - TZ=Europe/Berlin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.assessment.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/assessment`)"
      - "traefik.http.routers.assessment.priority=200"
      - "traefik.http.routers.assessment.entrypoints=websecure"
      - "traefik.http.routers.assessment.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.assessment-strip-prefix.stripPrefix.prefixes=/assessment"
      - "traefik.http.routers.assessment.middlewares=assessment-strip-prefix,assessment-compress"
      - "traefik.http.middlewares.assessment-compress.compress=true"
    expose:
