      - "traefik.http.routers.self-team-allocation.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/self-team-allocation`)"
      - "traefik.http.routers.self-team-allocation.priority=200"
      - "traefik.http.routers.self-team-allocation.entrypoints=websecure"
      - "traefik.http.routers.self-team-allocation.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.self-team-allocation-strip-prefix.stripPrefix.prefixes=/self-team-allocation"
      - "traefik.http.routers.self-team-allocation.middlewares=self-team-allocation-strip-prefix,self-team-allocation-compress"
      - "traefik.http.middlewares.self-team-allocation-compress.compress=true"
    expose:
      - "80"
    depends_on:
      - server-core
    restart: unless-stopped
    networks:
      - prompt-network

  client-template-component:
    image: "ghcr.io/prompt-edu/prompt/prompt-clients-template-component:${TEMPLATE_IMAGE_TAG}"
    container_name: prompt-client-template-component
    environment:
      - TZ=Europe/Berlin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.template.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/template`)"
      - "traefik.http.routers.template.entrypoints=websecure"
      - "traefik.http.routers.template.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.template-strip-prefix.stripPrefix.prefixes=/template"
      - "traefik.http.routers.template.middlewares=template-strip-prefix,template-compress"
      - "traefik.http.middlewares.template-compress.compress=true"
    expose:
      - "80"
    depends_on:
      - server-core
    restart: unless-stopped
    networks:
      - prompt-network

  client-certificate-component:
    image: "ghcr.io/prompt-edu/prompt/prompt-clients-certificate-component:${CERTIFICATE_IMAGE_TAG}"
    container_name: prompt-client-certificate-component
    environment:
      - TZ=Europe/Berlin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.certificate.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/certificate`)"
      - "traefik.http.routers.certificate.priority=200"
      - "traefik.http.routers.certificate.entrypoints=websecure"
      - "traefik.http.routers.certificate.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.certificate-strip-prefix.stripPrefix.prefixes=/certificate"
      - "traefik.http.routers.certificate.middlewares=certificate-strip-prefix,certificate-compress"
      - "traefik.http.middlewares.certificate-compress.compress=true"
    expose:
      - "80"
    depends_on:
      - server-core
      - server-certificate
    restart: unless-stopped
    networks:
      - prompt-network

  client-core:
    image: "ghcr.io/prompt-edu/prompt/prompt-clients-core:${CORE_IMAGE_TAG}"
    container_name: prompt-client-core
    environment:
      - TZ=Europe/Berlin
      - ENVIRONMENT
      - CORE_HOST
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - CHAIR_NAME_SHORT
      - CHAIR_NAME_LONG
      - GITHUB_SHA
      - GITHUB_REF
      - SERVER_CORE_IMAGE_TAG
      - INTRO_COURSE_HOST
      - DEVOPS_CHALLENGE_HOST
      - ASSESSMENT_HOST
      - TEAM_ALLOCATION_HOST
      - SELF_TEAM_ALLOCATION_HOST
      - TEMPLATE_HOST
      - INTERVIEW_HOST
      - CERTIFICATE_HOST
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`prompt-websec.aet.cit.tum.de`)"
      - "traefik.http.routers.core.entrypoints=websecure"
      - "traefik.http.routers.core.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.core-compress.compress=true"
      - "traefik.http.routers.core.middlewares=core-compress"
    expose:
      - "80"
    depends_on:
      - server-core
    volumes:
      # Placeholder imprint / privacy / logo (replace with real chair assets if desired).
      - ./privacy.html:/usr/share/nginx/html/privacy.html:ro
      - ./imprint.html:/usr/share/nginx/html/imprint.html:ro
      - ./chair-logo.jpeg:/usr/share/nginx/html/chair-logo.jpeg:ro
    restart: unless-stopped
    networks:
      - prompt-network

  # ---------------------------------------------------------------------------
  # SeaweedFS S3-compatible file storage. S3 gateway exposed under /s3 (best-effort;
  # presigned-URL path-style signing across a path prefix may need follow-up).
  # ---------------------------------------------------------------------------
  seaweedfs-master:
    image: chrislusf/seaweedfs:4.33
    container_name: prompt-seaweedfs-master
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0"
    volumes:
      - ./seaweedfs_master_data:/data
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    expose:
      - "9333"
      - "19333"
    networks:
      - prompt-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  seaweedfs-volume:
    image: chrislusf/seaweedfs:4.33
    container_name: prompt-seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -ip.bind=0.0.0.0 -port=8080"
    volumes:
      - ./seaweedfs_volume_data:/data
    depends_on:
      - seaweedfs-master
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    expose:
      - "8080"
      - "18080"
    networks:
      - prompt-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.33
    container_name: prompt-seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -ip.bind=0.0.0.0"
    volumes:
      - ./seaweedfs_filer_data:/data
    depends_on:
      - seaweedfs-master
    restart: unless-stopped
    expose:
      - "8888"
    networks:
      - prompt-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8888/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  seaweedfs-s3:
    image: chrislusf/seaweedfs:4.33
    container_name: prompt-seaweedfs-s3
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        cat >/tmp/s3.json <<EOF
        {
          "identities": [
            {
              "name": "prompt-s3",
              "credentials": [
                {
                  "accessKey": "$$WEED_S3_DEFAULT_USER",
                  "secretKey": "$$WEED_S3_DEFAULT_PWD"
                }
              ],
              "actions": ["Admin", "Read", "Write"]
            }
          ]
        }
        EOF
        exec weed s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -config=/tmp/s3.json
    depends_on:
      - seaweedfs-master
      - seaweedfs-filer
    restart: unless-stopped
    environment:
      - WEED_S3_DEFAULT_USER=${S3_ACCESS_KEY}
      - WEED_S3_DEFAULT_PWD=${S3_SECRET_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seaweedfs-s3.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/s3`)"
      - "traefik.http.routers.seaweedfs-s3.entrypoints=websecure"
      - "traefik.http.routers.seaweedfs-s3.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.s3-strip-prefix.stripPrefix.prefixes=/s3"
      - "traefik.http.routers.seaweedfs-s3.middlewares=s3-strip-prefix"
      - "traefik.http.services.seaweedfs-s3.loadbalancer.server.port=8333"
    expose:
      - "8333"
    networks:
      - prompt-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$(wget --server-response --spider -q http://localhost:8333/ 2>&1 | grep -Eo \"HTTP/[0-9.]+ [0-9]+\" | tail -1 | cut -d\" \" -f2); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"403\" ]",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # External course-phase modules. The core shell has these Module Federation
  # remotes configured, so they must be served on this host as well.
  # ---------------------------------------------------------------------------
  db-intro-course:
    image: postgres:15.18-alpine
    container_name: prompt-db-intro-course
    environment:
      - POSTGRES_DB=${DB_INTRO_COURSE_NAME}
      - POSTGRES_USER=${DB_INTRO_COURSE_USER}
      - POSTGRES_PASSWORD=${DB_INTRO_COURSE_PASSWORD}
      - TZ=Europe/Berlin
    volumes:
      - ./postgres_intro_course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_INTRO_COURSE_USER} -d ${DB_INTRO_COURSE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prompt-network

  server-intro-course:
    image: ghcr.io/prompt-edu/prompt-intro-course/prompt-server-intro-course:${INTRO_COURSE_SERVER_IMAGE_TAG}
    container_name: prompt-server-intro-course
    environment:
      - SERVER_ADDRESS=0.0.0.0:8080
      - CORE_HOST
      - SERVER_CORE_HOST
      - DB_HOST=db-intro-course
      - DB_PORT=5432
      - DB_NAME=${DB_INTRO_COURSE_NAME}
      - DB_USER=${DB_INTRO_COURSE_USER}
      - DB_PASSWORD=${DB_INTRO_COURSE_PASSWORD}
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - KEYCLOAK_AUTHORIZED_PARTY
      - KEYCLOAK_CLIENT_ID
      - GITLAB_ACCESS_TOKEN
      - SENTRY_DSN=${SENTRY_DSN_INTRO_COURSE}
    depends_on:
      db-intro-course:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.intro-course-api.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/intro-course/api`)"
      - "traefik.http.routers.intro-course-api.entrypoints=websecure"
      - "traefik.http.routers.intro-course-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.intro-course-api.priority=220"
      - "traefik.http.services.intro-course-api.loadbalancer.server.port=8080"
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - prompt-network

  client-intro-course:
    image: ghcr.io/prompt-edu/prompt-intro-course/prompt-clients-intro-course-developer:${INTRO_COURSE_CLIENT_IMAGE_TAG}
    container_name: prompt-client-intro-course
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.intro-course.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/intro-course`)"
      - "traefik.http.routers.intro-course.entrypoints=websecure"
      - "traefik.http.routers.intro-course.tls.certresolver=letsencrypt"
      - "traefik.http.routers.intro-course.priority=200"
      - "traefik.http.middlewares.intro-course-strip.stripPrefix.prefixes=/intro-course"
      - "traefik.http.routers.intro-course.middlewares=intro-course-strip"
      - "traefik.http.routers.intro-course-developer.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/intro-course-developer`)"
      - "traefik.http.routers.intro-course-developer.entrypoints=websecure"
      - "traefik.http.routers.intro-course-developer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.intro-course-developer.priority=210"
      - "traefik.http.middlewares.intro-course-developer-strip.stripPrefix.prefixes=/intro-course-developer"
      - "traefik.http.routers.intro-course-developer.middlewares=intro-course-developer-strip"
      - "traefik.http.services.intro-course.loadbalancer.server.port=80"
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - prompt-network

  client-github-challenge:
    image: ghcr.io/prompt-edu/prompt-github-challenge/prompt-clients-github-challenge-component:${GITHUB_CHALLENGE_IMAGE_TAG}
    container_name: prompt-client-github-challenge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devops-challenge.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/devops-challenge`)"
      - "traefik.http.routers.devops-challenge.entrypoints=websecure"
      - "traefik.http.routers.devops-challenge.tls.certresolver=letsencrypt"
      - "traefik.http.routers.devops-challenge.priority=200"
      - "traefik.http.middlewares.devops-challenge-strip.stripPrefix.prefixes=/devops-challenge"
      - "traefik.http.routers.devops-challenge.middlewares=devops-challenge-strip"
      - "traefik.http.routers.github-challenge.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/github-challenge`)"
      - "traefik.http.routers.github-challenge.entrypoints=websecure"
      - "traefik.http.routers.github-challenge.tls.certresolver=letsencrypt"
      - "traefik.http.routers.github-challenge.priority=200"
      - "traefik.http.middlewares.github-challenge-strip.stripPrefix.prefixes=/github-challenge"
      - "traefik.http.routers.github-challenge.middlewares=github-challenge-strip"
      - "traefik.http.services.github-challenge.loadbalancer.server.port=80"
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - prompt-network

networks:
  # Create the network manually in advance: docker network create prompt-network
  prompt-network:
    name: prompt-network
    external: true
