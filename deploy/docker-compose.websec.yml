  server-interview:
    image: "ghcr.io/prompt-edu/prompt/prompt-server-interview:${SERVER_INTERVIEW_IMAGE_TAG}"
    container_name: prompt-server-interview
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-interview.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/interview/api`)"
      - "traefik.http.routers.server-interview.priority=220"
      - "traefik.http.services.server-interview.loadbalancer.server.port=8080"
      - "traefik.http.routers.server-interview.entrypoints=websecure"
      - "traefik.http.routers.server-interview.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-interview.middlewares=api-ratelimit"
    depends_on:
      db-interview:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      - CORE_HOST
      - SERVER_CORE_HOST
      - SERVER_ADDRESS
      - DB_HOST_INTERVIEW=db-interview
      - DB_PORT_INTERVIEW=5432
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - SENTRY_DSN_INTERVIEW
      - SENTRY_ENABLED
    restart: unless-stopped
    networks:
      - prompt-network

  server-certificate:
    image: "ghcr.io/prompt-edu/prompt/prompt-server-certificate:${SERVER_CERTIFICATE_IMAGE_TAG}"
    container_name: prompt-server-certificate
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server-certificate.rule=Host(`prompt-websec.aet.cit.tum.de`) && PathPrefix(`/certificate/api`)"
      - "traefik.http.routers.server-certificate.priority=220"
      - "traefik.http.services.server-certificate.loadbalancer.server.port=8080"
      - "traefik.http.routers.server-certificate.entrypoints=websecure"
      - "traefik.http.routers.server-certificate.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-certificate.middlewares=api-ratelimit"
