  client-infrastructure-setup-component:
    image: "ghcr.io/prompt-edu/prompt/prompt-clients-infrastructure-setup-component:${INFRASTRUCTURE_SETUP_IMAGE_TAG}"
    container_name: prompt-client-infrastructure-setup-component
    environment:
      - TZ=Europe/Berlin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infrastructure-setup.rule=Host(`${CORE_HOST}`) && PathPrefix(`/infrastructure-setup`)"
      - "traefik.http.routers.infrastructure-setup.entrypoints=websecure"
      - "traefik.http.routers.infrastructure-setup.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.infrastructure-setup-strip-prefix.stripPrefix.prefixes=/infrastructure-setup"
      - "traefik.http.routers.infrastructure-setup.middlewares=infrastructure-setup-strip-prefix,infrastructure-setup-compress"
      - "traefik.http.middlewares.infrastructure-setup-compress.compress=true"
    expose:
      - "80"
    depends_on:
      - server-core
      - server-infrastructure-setup
    networks:
      - prompt-network

  client-core:
    image: "ghcr.io/prompt-edu/prompt/prompt-clients-core:${CORE_IMAGE_TAG}"
    container_name: prompt-client-core
    environment:
      - TZ=Europe/Berlin
      - ENVIRONMENT
      - CORE_HOST
      - KEYCLOAK_HOST
      - KEYCLOAK_REALM_NAME
      - CHAIR_NAME_SHORT
      - CHAIR_NAME_LONG
      - GITHUB_SHA
      - GITHUB_REF
      - SERVER_CORE_IMAGE_TAG
      - INTRO_COURSE_HOST
      - DEVOPS_CHALLENGE_HOST
      - ASSESSMENT_HOST
      - TEAM_ALLOCATION_HOST
      - SELF_TEAM_ALLOCATION_HOST
      - TEMPLATE_HOST
      - INTERVIEW_HOST
      - CERTIFICATE_HOST
      - INFRASTRUCTURE_SETUP_HOST
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core.rule=Host(`${CORE_HOST}`)"
      - "traefik.http.routers.core.entrypoints=websecure"
      - "traefik.http.routers.core.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.core-compress.compress=true"
    expose:
      - "80"
    depends_on:
      - server-core
    networks:
      - prompt-network

  # SeaweedFS Master Server
  seaweedfs-master:
    image: chrislusf/seaweedfs:4.25
    container_name: prompt-seaweedfs-master
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0"
    volumes:
      - ./seaweedfs_master_data:/data
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    expose:
      - "9333"
      - "19333"
    networks:
      - prompt-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SeaweedFS Volume Server
  seaweedfs-volume:
    image: chrislusf/seaweedfs:4.25
    container_name: prompt-seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -ip.bind=0.0.0.0 -port=8080"
    volumes:
      - ./seaweedfs_volume_data:/data
    depends_on:
      - seaweedfs-master
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    expose:
      - "8080"
      - "18080"
    networks:
      - prompt-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SeaweedFS Filer (required for S3)
  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.25
    container_name: prompt-seaweedfs-filer
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -ip.bind=0.0.0.0"
    volumes:
      - ./seaweedfs_filer_data:/data
    depends_on:
      - seaweedfs-master
    restart: unless-stopped
    expose:
      - "8888"
    networks:
      - prompt-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8888/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # SeaweedFS S3 Gateway (public access via presigned URLs only)
  seaweedfs-s3:
    image: chrislusf/seaweedfs:4.25
    container_name: prompt-seaweedfs-s3
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        cat >/tmp/s3.json <<EOF
        {
          "identities": [
            {
              "name": "prompt-s3",
              "credentials": [
                {
                  "accessKey": "$$WEED_S3_DEFAULT_USER",
                  "secretKey": "$$WEED_S3_DEFAULT_PWD"
                }
              ],
              "actions": ["Admin", "Read", "Write"]
            }
          ]
        }
        EOF
        exec weed s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -config=/tmp/s3.json
    depends_on:
      - seaweedfs-master
      - seaweedfs-filer
    restart: unless-stopped
    environment:
      - WEED_S3_DEFAULT_USER=${S3_ACCESS_KEY}
      - WEED_S3_DEFAULT_PWD=${S3_SECRET_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seaweedfs-s3.rule=Host(`s3.${CORE_HOST}`)"
      - "traefik.http.routers.seaweedfs-s3.entrypoints=websecure"
      - "traefik.http.routers.seaweedfs-s3.tls.certresolver=letsencrypt"
      - "traefik.http.services.seaweedfs-s3.loadbalancer.server.port=8333"
    expose:
      - "8333"
    networks:
      - prompt-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$(wget --server-response --spider -q http://localhost:8333/ 2>&1 | grep -Eo \"HTTP/[0-9.]+ [0-9]+\" | tail -1 | cut -d\" \" -f2); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"403\" ]",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  # Create network manually in advance: docker network create prompt-network
  prompt-network:
    name: prompt-network
    external: true
