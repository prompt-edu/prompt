# Overrides the core client's default nginx config in the e2e stack
# (mounted over /etc/nginx/conf.d/default.conf by docker-compose.e2e.yml).
#
# In prod, Traefik routes the phase-module path prefixes; the e2e stack has no
# Traefik, so this config mirrors those rules per module:
#   /<module>/api/*  ->  phase server, prefix KEPT (the Go server groups its
#                        routes under <module>/api/...)
#   /<module>/*      ->  phase client nginx, prefix STRIPPED (the MF remote is
#                        built with publicPath 'auto' and served at /)
# nginx picks the longest matching prefix, so the api location wins for API
# calls. Everything else falls through to the SPA below.

server {

  listen 80;

  location /self-team-allocation/api/ {
    proxy_pass http://server-self-team-allocation:8080;
  }

  location /self-team-allocation/ {
    proxy_pass http://client-self-team-allocation/;
  }

  location /assessment/api/ {
    proxy_pass http://server-assessment:8080;
  }

  location /assessment/ {
    proxy_pass http://client-assessment/;
  }

  # Matching has no phase server (core-hosted backend), so only the client
  # remote is proxied — no /matching/api/ location.
  location /matching/ {
    proxy_pass http://client-matching/;
  }

  location /interview/api/ {
    proxy_pass http://server-interview:8080;
  }

  location /interview/ {
    proxy_pass http://client-interview/;
  }

  location /certificate/api/ {
    proxy_pass http://server-certificate:8080;
  }

  location /certificate/ {
    proxy_pass http://client-certificate/;
  }

  # Presentation feedback streams use SSE. Disable response buffering and
  # compression on API traffic so category updates arrive immediately.
  location /presentation/api/ {
    proxy_pass http://server-presentation:8080;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_read_timeout 1h;
  }

  location /presentation/ {
    proxy_pass http://client-presentation/;
  }

  location / {
    gzip_static on;
    root   /usr/share/nginx/html;
    index  index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  error_page   500 502 503 504  /50x.html;

  location = /50x.html {
    root   /usr/share/nginx/html;
  }

}
